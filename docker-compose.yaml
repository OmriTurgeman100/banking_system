version: '3.8'

services:
  server:
    build: ./server
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/banking_system
      - NODE_ENV=development
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
